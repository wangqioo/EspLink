services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: esplink
      MYSQL_USER: esplink
      MYSQL_PASSWORD: esplink123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: ./api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: ./api/.env
    depends_on:
      - mysql
      - redis
    volumes:
      - ./api:/app

volumes:
  mysql_data:
  redis_data:
